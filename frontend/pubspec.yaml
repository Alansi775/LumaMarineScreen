name: luma_marine
description: "Luma Marine — Smart Yacht Control Panel"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  # Bundled locally — a kiosk device has no business fetching fonts over
  # the network at runtime (see google_fonts HOME/XDG crash, 2026-07-09).
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Variable.ttf
          weight: 400
        - asset: assets/fonts/Manrope-Variable.ttf
          weight: 500
        - asset: assets/fonts/Manrope-Variable.ttf
          weight: 600
        - asset: assets/fonts/Manrope-Variable.ttf
          weight: 700
        - asset: assets/fonts/Manrope-Variable.ttf
          weight: 800
